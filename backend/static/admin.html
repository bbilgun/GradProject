<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ШУТИС Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #172A8A;
      --blue-soft:  #EFF3FF;
      --cyan:       #0F766E;
      --gold:       #B7791F;
      --gold-bg:    #FFF8E6;
      --gold-pill:  #FFF0BC;
      --bg:         #F6F7FB;
      --surface:    #FFFFFF;
      --surface-2:  #FBFCFE;
      --border:     #DDE3EE;
      --border-2:   #CAD3E1;
      --muted:      #667085;
      --soft:       #98A2B3;
      --body:       #182230;
      --red:        #B42318;
      --red-bg:     #FEF3F2;
      --green:      #067647;
      --green-bg:   #ECFDF3;
      --radius-sm:  6px;
      --radius:     8px;
      --shadow-xs:  0 1px 2px rgba(16, 24, 40, 0.05);
      --shadow-sm:  0 8px 24px rgba(16, 24, 40, 0.08);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        linear-gradient(180deg, #FFFFFF 0, var(--bg) 260px);
      min-height: 100vh;
      color: var(--body);
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.45;
    }

    /* Top nav */
    .nav {
      width: 100%;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .nav-mark {
      width: 36px;
      height: 36px;
      background: var(--blue);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(23,42,138,0.18);
      flex-shrink: 0;
    }
    .nav-mark svg { width: 18px; height: 18px; fill: #fff; }
    .nav-title { font-size: 15px; font-weight: 800; color: var(--body); letter-spacing: 0; }
    .nav-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }
    #nav-session {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(6,118,71,0.14);
      flex-shrink: 0;
    }
    #nav-user {
      font-size: 13px;
      color: var(--body);
      font-weight: 700;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-nav-logout {
      height: 34px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
    }
    .btn-nav-logout:hover { background: var(--red-bg); border-color: #FDA29B; color: var(--red); }

    /* Layout */
    .page {
      width: 100%;
      max-width: 1180px;
      padding: 28px 24px 72px;
    }
    .dashboard-shell { width: 100%; }
    .workspace-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }
    .workspace-kicker {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .workspace-title { font-size: 28px; font-weight: 800; letter-spacing: 0; }
    .workspace-sub { color: var(--muted); font-size: 14px; margin-top: 3px; }
    .workspace-metrics { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .metric-pill {
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow-xs);
    }
    .metric-pill strong { color: var(--body); font-weight: 800; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, .92fr);
      gap: 18px;
      align-items: start;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-xs);
    }
    .card:hover { box-shadow: var(--shadow-sm); }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-head-main { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .card-head-icon {
      width: 36px;
      height: 36px;
      background: var(--blue-soft);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-head-icon svg { width: 16px; height: 16px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .card-head-title { font-size: 16px; font-weight: 800; color: var(--body); letter-spacing: 0; }
    .card-head-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    #login-card {
      max-width: 460px;
      margin: 34px auto 0;
      padding: 30px;
      position: relative;
      overflow: hidden;
    }
    #login-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--gold));
    }

    /* Form elements */
    .field { margin-bottom: 18px; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="password"], textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 13px;
      font-size: 14px;
      font-family: inherit;
      color: var(--body);
      outline: none;
      transition: border-color .16s, background .16s, box-shadow .16s;
    }
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(23,42,138,0.10);
    }
    textarea { resize: vertical; min-height: 100px; }

    /* Special toggle */
    .special-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--gold-bg);
      border: 1px solid #FEDF89;
      border-radius: var(--radius);
      padding: 13px 14px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: background .18s, border-color .18s;
      user-select: none;
    }
    .special-row:hover { background: #FFF3D0; border-color: #FEC84B; }
    .special-row-left { display: flex; align-items: center; gap: 12px; }
    .special-icon {
      width: 38px;
      height: 38px;
      background: #D97706;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .special-icon svg { width: 18px; height: 18px; fill: #fff; }
    .special-label { font-size: 14px; font-weight: 800; color: var(--body); }
    .special-hint  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .switch {
      width: 44px;
      height: 24px;
      background: #D0D5DD;
      border-radius: 12px;
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }
    .switch.on { background: var(--blue); }
    .switch-knob {
      position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .switch.on .switch-knob { transform: translateX(20px); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .14s, transform .1s, box-shadow .14s, background .14s, border-color .14s, color .14s;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(23,42,138,0.22);
    }
    .btn-primary:hover { box-shadow: 0 10px 24px rgba(23,42,138,0.28); }
    .btn-ghost  { background: var(--blue-soft); color: var(--blue); border-color: #D7E0FF; }
    .btn-ghost:hover { background: #E4EAFF; border-color: #BBC7F6; }
    .btn-danger { background: var(--red-bg); color: var(--red); border-color: #FECDCA; }
    .btn-danger:hover { background: #FEE4E2; border-color: #FDA29B; }
    .btn-outline {
      background: #fff;
      color: var(--muted);
      border: 1px dashed var(--border-2);
      width: 100%;
    }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
    .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: var(--radius-sm); }

    /* Alerts */
    .alert {
      display: none;
      align-items: center;
      gap: 10px;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .alert svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .alert.err { display: flex; background: var(--red-bg); color: var(--red); border: 1px solid #FECDCA; }
    .alert.ok  { display: flex; background: var(--green-bg); color: var(--green); border: 1px solid #ABEFC6; }

    /* Image upload */
    #cover-preview {
      display: none;
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .upload-row { display: flex; gap: 8px; }
    .upload-row .btn-outline { flex: 1; }

    /* Sections */
    .sections-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .sections-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    #sections-wrap { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

    .sec-block {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px 14px;
      background: var(--surface-2);
      transition: border-color .18s, background .18s, box-shadow .18s;
    }
    .sec-block:focus-within { border-color: #A4BCFD; background: #fff; box-shadow: 0 0 0 3px rgba(23,42,138,0.06); }
    .sec-block input[type="text"], .sec-block textarea { background: #fff; }
    .sec-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .sec-num {
      font-size: 10px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--blue-soft);
      padding: 4px 10px;
      border-radius: 999px;
    }
    .sec-img-preview {
      display: none;
      width: 100%;
      max-height: 150px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .sec-upload-row { display: flex; gap: 8px; }
    .sec-upload-row .btn-outline { flex: 1; font-size: 12px; padding: 9px; }

    hr.divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

    /* News list */
    #list-card {
      position: sticky;
      top: 84px;
    }
    #news-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: calc(100vh - 210px);
      overflow: auto;
      padding-right: 4px;
    }
    #news-list::-webkit-scrollbar { width: 8px; }
    #news-list::-webkit-scrollbar-thumb { background: #D0D5DD; border-radius: 999px; }

    .news-card {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow .18s, border-color .18s, transform .18s;
    }
    .news-card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-2); transform: translateY(-1px); }
    .news-card.is-special { border-left: 4px solid var(--gold); }

    .news-thumb {
      min-height: 92px;
      background: var(--blue-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .news-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .news-thumb-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 92px; }
    .news-thumb-placeholder svg { width: 24px; height: 24px; stroke: rgba(23,42,138,0.35); fill: none; stroke-width: 1.5; }

    .news-body {
      padding: 13px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      min-height: 92px;
    }
    .news-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .news-tags { display: flex; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .tag-special { background: var(--gold-pill); color: #854A0E; }
    .tag-new     { background: var(--blue-soft); color: var(--blue); }
    .news-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--body);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .news-meta  { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .news-actions {
      padding: 12px 12px 12px 0;
      display: flex;
      align-items: center;
    }

    .empty-state { text-align: center; padding: 36px 0; color: var(--muted); }
    .empty-state svg { width: 36px; height: 36px; stroke: #C9CDE8; fill: none; stroke-width: 1.5; margin: 0 auto 10px; display: block; }
    .empty-state p { font-size: 13px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner-dark {
      border-color: rgba(23,42,138,0.15);
      border-top-color: var(--blue);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .page { padding: 22px 16px 56px; }
      .workspace-head { align-items: flex-start; flex-direction: column; }
      .workspace-metrics { justify-content: flex-start; }
      .dashboard-grid { grid-template-columns: 1fr; }
      #list-card { position: static; }
      #news-list { max-height: none; overflow: visible; padding-right: 0; }
    }

    @media (max-width: 560px) {
      .nav { padding: 0 14px; }
      .nav-sub, #nav-user { display: none; }
      .workspace-title { font-size: 22px; }
      .card { padding: 18px; }
      #login-card { margin-top: 16px; padding: 22px; }
      .card-head { align-items: flex-start; }
      .sections-header, .special-row, .upload-row, .sec-upload-row { flex-direction: column; align-items: stretch; }
      .switch { align-self: flex-start; }
      .news-card { grid-template-columns: 74px minmax(0, 1fr); }
      .news-thumb, .news-thumb-placeholder { min-height: 92px; }
      .news-actions {
        grid-column: 1 / -1;
        padding: 0 12px 12px;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-mark">
      <svg viewBox="0 0 24 24"><path d="M12 3L2 9l10 6 10-6-10-6zM2 17l10 6 10-6M2 13l10 6 10-6"/></svg>
    </div>
    <div>
      <div class="nav-title">ШУТИС Admin</div>
      <div class="nav-sub">Мэдээ удирдах систем</div>
    </div>
  </div>
  <div id="nav-session">
    <div class="status-dot"></div>
    <span id="nav-user"></span>
    <button class="btn-nav-logout" onclick="doLogout()">Гарах</button>
  </div>
</nav>

<main class="page">

  <!-- LOGIN -->
  <div class="card" id="login-card">
    <div class="card-head">
      <div class="card-head-main">
        <div class="card-head-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <div>
          <div class="card-head-title">Нэвтрэх</div>
          <div class="card-head-sub">Зөвхөн оюутны зөвлөлийн гишүүд</div>
        </div>
      </div>
    </div>

    <div class="alert" id="login-err">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="login-err-text"></span>
    </div>

    <div class="field">
      <label class="field-label">Оюутны дугаар</label>
      <input type="text" id="sid" placeholder="B221910027" maxlength="10" />
    </div>
    <div class="field">
      <label class="field-label">Нууц үг</label>
      <input type="password" id="pw" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="login-btn">Нэвтрэх</button>
  </div>

  <section class="dashboard-shell" id="dashboard-shell" style="display:none">
    <div class="workspace-head">
      <div>
        <div class="workspace-kicker">Admin workspace</div>
        <h1 class="workspace-title">Мэдээний самбар</h1>
        <p class="workspace-sub">Оюутны зөвлөл</p>
      </div>
      <div class="workspace-metrics">
        <span class="metric-pill"><strong id="summary-count">0</strong> мэдээ</span>
        <span class="metric-pill"><span class="status-dot"></span> API холбогдсон</span>
      </div>
    </div>

    <div class="dashboard-grid">

  <!-- POST NEWS -->
  <div class="card" id="post-card">
    <div class="card-head">
      <div class="card-head-main">
        <div class="card-head-icon">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <div>
          <div class="card-head-title">Шинэ мэдээ нийтлэх</div>
          <div class="card-head-sub">Бүх талбарыг бөглөнө үү</div>
        </div>
      </div>
    </div>

    <div class="alert" id="post-err">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="post-err-text"></span>
    </div>

    <!-- Title -->
    <div class="field">
      <label class="field-label">Гарчиг</label>
      <input type="text" id="title" placeholder="Мэдээний гарчиг…" />
    </div>

    <!-- Special toggle -->
    <div class="special-row" onclick="toggleSpecial()">
      <div class="special-row-left">
        <div class="special-icon">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div>
          <div class="special-label">Онцлох мэдээ</div>
          <div class="special-hint">Апп-д тусгай каруселд харагдана</div>
        </div>
      </div>
      <div class="switch" id="special-switch"><div class="switch-knob"></div></div>
    </div>
    <input type="hidden" id="is-special" value="false" />

    <!-- Cover image -->
    <div class="field">
      <label class="field-label">Нүүр зураг — заавал биш</label>
      <img id="cover-preview" alt="" />
      <div class="upload-row">
        <button class="btn btn-outline" onclick="triggerUpload('cover-file')">
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
          <span id="cover-label">Зураг оруулах</span>
        </button>
        <button id="cover-remove-btn" class="btn btn-danger btn-sm" style="display:none" onclick="clearCoverImg()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Устгах
        </button>
      </div>
      <input type="file" id="cover-file" accept="image/*" style="display:none"
        onchange="handleUpload(this,'cover-preview',setCoverUrl,'cover-label')" />
    </div>

    <hr class="divider" />

    <!-- Sections -->
    <div class="sections-header">
      <span class="sections-label">Дэд хэсгүүд</span>
      <button class="btn btn-ghost btn-sm" onclick="addSection()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Хэсэг нэмэх
      </button>
    </div>
    <div id="sections-wrap"></div>

    <button class="btn btn-primary" onclick="doPost()" id="submit-btn">Нийтлэх</button>
  </div>

  <!-- NEWS LIST -->
  <div class="card" id="list-card">
    <div class="card-head">
      <div class="card-head-main">
        <div class="card-head-icon">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        </div>
        <div>
          <div class="card-head-title">Нийтлэгдсэн мэдээнүүд</div>
          <div class="card-head-sub" id="list-count">Ачаалж байна…</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadNews()">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 10-2.64 6.36"/><path d="M21 16v5h-5"/></svg>
        Шинэчлэх
      </button>
    </div>
    <div id="news-list">
      <div class="empty-state"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><p>Ачаалж байна…</p></div>
    </div>
  </div>

    </div>
  </section>

</main><!-- /page -->

<script>
  const BASE = location.origin;
  let token = localStorage.getItem('admin_token') || '';
  let coverUrl = '';
  let isSpecial = false;
  let sectionCount = 0;

  if (token) restoreSession();

  /* ── Toggle ──────────────────────────────────── */
  function toggleSpecial() {
    isSpecial = !isSpecial;
    document.getElementById('is-special').value = String(isSpecial);
    document.getElementById('special-switch').classList.toggle('on', isSpecial);
  }

  /* ── Session ─────────────────────────────────── */
  async function restoreSession() {
    try {
      const r = await fetch(`${BASE}/users/me`, { headers: auth() });
      if (!r.ok) { doLogout(); return; }
      showDashboard(await r.json());
    } catch { doLogout(); }
  }

  /* ── Login ───────────────────────────────────── */
  async function doLogin() {
    const sid = document.getElementById('sid').value.trim().toUpperCase();
    const pw  = document.getElementById('pw').value;
    clearAlert('login-err');
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Нэвтэрч байна…';
    try {
      const r = await fetch(`${BASE}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: sid, password: pw }),
      });
      const data = await r.json();
      if (!r.ok) { showAlert('login-err', data.detail || 'Нэвтрэхэд алдаа.', 'err'); return; }
      const me = await (await fetch(`${BASE}/users/me`, { headers: { Authorization: `Bearer ${data.access_token}` } })).json();
      if (!['admin','student_council'].includes(me.role)) {
        showAlert('login-err', 'Зөвхөн оюутны зөвлөлийн гишүүд нэвтэрнэ.', 'err'); return;
      }
      token = data.access_token;
      localStorage.setItem('admin_token', token);
      showDashboard(me);
    } catch { showAlert('login-err', 'Серверт холбогдоход алдаа.', 'err'); }
    finally { btn.disabled = false; btn.textContent = 'Нэвтрэх'; }
  }

  function doLogout() {
    token = ''; localStorage.removeItem('admin_token');
    show('login-card'); hide('dashboard-shell');
    document.getElementById('nav-session').style.display = 'none';
  }

  function showDashboard(user) {
    hide('login-card'); show('dashboard-shell');
    document.getElementById('nav-session').style.display = 'flex';
    document.getElementById('nav-user').textContent = `${user.full_name || user.student_id}`;
    if (!document.getElementById('sections-wrap').children.length) addSection();
    loadNews();
  }

  /* ── Sections ────────────────────────────────── */
  function addSection() {
    const idx  = sectionCount++;
    const wrap = document.getElementById('sections-wrap');
    const num  = wrap.children.length + 1;
    const div  = document.createElement('div');
    div.className = 'sec-block'; div.id = `sec-${idx}`;
    div.innerHTML = `
      <div class="sec-head">
        <span class="sec-num">Хэсэг ${num}</span>
        <button class="btn btn-danger btn-sm" onclick="removeSection('sec-${idx}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Устгах
        </button>
      </div>
      <div class="field">
        <label class="field-label">Дэд гарчиг — заавал биш</label>
        <input type="text" id="sec-sub-${idx}" placeholder="Дэд гарчиг…" />
      </div>
      <div class="field">
        <label class="field-label">Агуулга</label>
        <textarea id="sec-body-${idx}" placeholder="Хэсгийн агуулга…" rows="4"></textarea>
      </div>
      <img id="sec-img-${idx}" class="sec-img-preview" alt="" />
      <div class="sec-upload-row">
        <button class="btn btn-outline" onclick="triggerUpload('sec-file-${idx}')">
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
          <span id="sec-lbl-${idx}">Зураг нэмэх — заавал биш</span>
        </button>
        <button id="sec-rm-${idx}" class="btn btn-danger btn-sm" style="display:none" onclick="clearSecImg(${idx})">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Устгах
        </button>
      </div>
      <input type="file" id="sec-file-${idx}" accept="image/*" style="display:none"
        onchange="handleUpload(this,'sec-img-${idx}',u=>setSecImg(${idx},u),'sec-lbl-${idx}')" />
      <input type="hidden" id="sec-url-${idx}" value="" />`;
    wrap.appendChild(div);
    renumber();
  }

  function removeSection(id) { document.getElementById(id)?.remove(); renumber(); }
  function renumber() {
    document.querySelectorAll('.sec-num').forEach((el,i) => { el.textContent = `Хэсэг ${i+1}`; });
  }

  function setSecImg(idx, url) {
    document.getElementById(`sec-url-${idx}`).value = url;
    const btn = document.getElementById(`sec-rm-${idx}`);
    if (btn) btn.style.display = url ? '' : 'none';
  }
  function clearSecImg(idx) {
    document.getElementById(`sec-url-${idx}`).value = '';
    const img = document.getElementById(`sec-img-${idx}`); img.src=''; img.style.display='none';
    const lbl = document.getElementById(`sec-lbl-${idx}`); if(lbl) lbl.textContent='Зураг нэмэх — заавал биш';
    const btn = document.getElementById(`sec-rm-${idx}`);  if(btn) btn.style.display='none';
  }

  /* ── Upload ──────────────────────────────────── */
  function triggerUpload(id) { document.getElementById(id).click(); }

  async function handleUpload(input, previewId, cb, labelId) {
    const file = input.files[0]; if (!file) return;
    const lbl = document.getElementById(labelId);
    if (lbl) lbl.innerHTML = '<span class="spinner spinner-dark"></span> Ачаалж байна…';
    try {
      const fd = new FormData(); fd.append('file', file);
      const r = await fetch(`${BASE}/admin/upload`, { method:'POST', headers: auth(), body: fd });
      if (!r.ok) throw new Error((await r.json()).detail || 'Алдаа');
      const { url } = await r.json();
      const img = document.getElementById(previewId);
      img.src = `${BASE}${url}`; img.style.display = 'block';
      cb(url);
      if (lbl) lbl.textContent = 'Зураг солих';
    } catch(e) { if (lbl) lbl.textContent = 'Алдаа: ' + e.message; }
    input.value = '';
  }

  function setCoverUrl(url) {
    coverUrl = url;
    document.getElementById('cover-remove-btn').style.display = url ? '' : 'none';
  }
  function clearCoverImg() {
    coverUrl = '';
    const img = document.getElementById('cover-preview'); img.src=''; img.style.display='none';
    document.getElementById('cover-label').textContent = 'Зураг оруулах';
    document.getElementById('cover-remove-btn').style.display = 'none';
  }

  /* ── Post ────────────────────────────────────── */
  async function doPost() {
    const title = document.getElementById('title').value.trim();
    clearAlert('post-err');
    if (!title) { showAlert('post-err', 'Гарчиг оруулна уу.', 'err'); return; }

    const sections = []; let order = 0;
    for (const block of document.querySelectorAll('.sec-block')) {
      const idx  = block.id.replace('sec-','');
      const body = document.getElementById(`sec-body-${idx}`)?.value.trim();
      if (!body) { showAlert('post-err', 'Бүх хэсгийн агуулгыг оруулна уу.', 'err'); return; }
      sections.push({
        subtitle:  document.getElementById(`sec-sub-${idx}`)?.value.trim() || null,
        body,
        image_url: document.getElementById(`sec-url-${idx}`)?.value || null,
        order:     order++,
      });
    }
    if (!sections.length) { showAlert('post-err', 'Дор хаяж нэг хэсэг нэмнэ үү.', 'err'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Нийтэлж байна…';
    try {
      const r = await fetch(`${BASE}/admin/news`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...auth() },
        body: JSON.stringify({ title, cover_image_url: coverUrl||null, is_special: isSpecial, sections }),
      });
      const data = await r.json();
      if (!r.ok) { showAlert('post-err', data.detail || 'Алдаа гарлаа.', 'err'); return; }

      showAlert('post-err', 'Мэдээ амжилттай нийтлэгдлээ.', 'ok');
      resetForm();
      loadNews();
    } catch { showAlert('post-err', 'Серверт алдаа гарлаа.', 'err'); }
    finally { btn.disabled = false; btn.textContent = 'Нийтлэх'; }
  }

  function resetForm() {
    document.getElementById('title').value = '';
    isSpecial = false;
    document.getElementById('is-special').value = 'false';
    document.getElementById('special-switch').classList.remove('on');
    clearCoverImg();
    sectionCount = 0;
    document.getElementById('sections-wrap').innerHTML = '';
    addSection();
  }

  /* ── List ────────────────────────────────────── */
  async function loadNews() {
    try {
      const items = await (await fetch(`${BASE}/news`)).json();
      const el = document.getElementById('news-list');
      const countEl = document.getElementById('list-count');
      if (!items.length) {
        countEl.textContent = '0 мэдээ';
        updateSummaryCount(0);
        el.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <p>Мэдээ байхгүй байна</p></div>`;
        return;
      }
      countEl.textContent = `${items.length} мэдээ`;
      updateSummaryCount(items.length);
      el.innerHTML = items.map(n => {
        const isNew  = Date.now() - new Date(n.created_at+'Z').getTime() < 86400000*2;
        const thumb  = n.cover_image_url
          ? `<div class="news-thumb"><img src="${BASE}${n.cover_image_url.startsWith('/')?n.cover_image_url:'/'+n.cover_image_url}" /></div>`
          : `<div class="news-thumb"><div class="news-thumb-placeholder"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div></div>`;
        const tags = [
          n.is_special ? `<span class="tag tag-special">Онцлох</span>` : '',
          isNew        ? `<span class="tag tag-new">Шинэ</span>`       : '',
        ].filter(Boolean).join('');
        return `<div class="news-card${n.is_special?' is-special':''}" id="ni-${n.id}">
          ${thumb}
          <div class="news-body">
            <div>
              ${tags ? `<div class="news-tags">${tags}</div>` : ''}
              <div class="news-title">${esc(n.title)}</div>
              <div class="news-meta">${esc(n.author_name||'—')} &middot; ${fmtDate(n.created_at)} &middot; ${n.sections.length} хэсэг</div>
            </div>
          </div>
          <div class="news-actions">
            <button class="btn btn-danger btn-sm" onclick="deleteNews(${n.id})">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              Устгах
            </button>
          </div>
        </div>`;
      }).join('');
    } catch {}
  }

  /* ── Delete ──────────────────────────────────── */
  async function deleteNews(id) {
    if (!confirm('Энэ мэдээг устгах уу? Энэ үйлдлийг буцаах боломжгүй.')) return;
    try {
      const r = await fetch(`${BASE}/admin/news/${id}`, { method:'DELETE', headers: auth() });
      if (r.ok) {
        document.getElementById(`ni-${id}`)?.remove();
        const el = document.getElementById('news-list');
        if (!el.children.length) {
          document.getElementById('list-count').textContent = '0 мэдээ';
          updateSummaryCount(0);
          el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><p>Мэдээ байхгүй байна</p></div>`;
        } else {
          const remaining = el.querySelectorAll('.news-card').length;
          document.getElementById('list-count').textContent = `${remaining} мэдээ`;
          updateSummaryCount(remaining);
        }
      } else { const d = await r.json(); alert(d.detail || 'Устгахад алдаа.'); }
    } catch { alert('Серверт холбогдоход алдаа.'); }
  }

  /* ── Helpers ─────────────────────────────────── */
  const auth = () => ({ Authorization: `Bearer ${token}` });
  const esc  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtDate = iso => new Date(iso+'Z').toLocaleString('mn-MN',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  function updateSummaryCount(count) {
    const el = document.getElementById('summary-count');
    if (el) el.textContent = String(count);
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    const txt = document.getElementById(id+'-text');
    el.className = `alert ${type}`;
    if (txt) txt.textContent = msg; else el.textContent = msg;
  }
  function clearAlert(id) { document.getElementById(id).className = 'alert'; }
  function show(id) { document.getElementById(id).style.display=''; }
  function hide(id) { document.getElementById(id).style.display='none'; }

  document.addEventListener('keydown', e => {
    if (e.key==='Enter' && document.activeElement.tagName!=='TEXTAREA')
      if (document.getElementById('login-card').style.display!=='none') doLogin();
  });
</script>
</body>
</html>
